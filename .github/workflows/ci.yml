name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"

      - name: Lint (ruff)
        run: .venv/bin/ruff check poe2_mcp/

      - name: Type check (pyright)
        run: .venv/bin/pyright poe2_mcp/

      - name: Import check
        run: .venv/bin/python -c "from poe2_mcp import wiki, server; print('imports ok')"
